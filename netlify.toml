[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_BASE_URL    = ""
  VITE_API_DIRECT_URL  = "https://split-app-api.fly.dev"

# Proxy auth and transaction API calls through Netlify so the auth_session
# cookie is set on the frontend's origin (avoids cross-site cookie blocks).
# The OAuth login redirect still goes directly to fly.dev (VITE_API_DIRECT_URL).
# Must come before the SPA catch-all.
[[redirects]]
  from   = "/auth/*"
  to     = "https://split-app-api.fly.dev/auth/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/transactions/*"
  to     = "https://split-app-api.fly.dev/transactions/:splat"
  status = 200
  force  = true

# SPA catch-all
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
